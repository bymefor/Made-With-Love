<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Made with Love by Munish Mishra</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    background: #0b0b1e;
    overflow-x: hidden; overflow-y: auto;
    font-family: "Raleway", sans-serif;
  }
  #flowerCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 55% at 15% 15%, rgba(110,30,130,0.22) 0%, transparent 65%),
      radial-gradient(ellipse 55% 70% at 85% 85%, rgba(25,70,170,0.22) 0%, transparent 65%);
    z-index: 0;
  }
  .content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; gap: 28px;
    padding: 40px 20px 60px;
    width: 100%;
  }

  /* Title */
  .title {
    font-family: "Great Vibes", cursive;
    font-size: clamp(2.4rem, 7vw, 5rem);
    color: #fff; text-align: center;
    animation: shimmer 4s ease-in-out infinite alternate;
  }
  @keyframes shimmer {
    from { text-shadow: 0 0 20px rgba(236,72,153,0.6), 0 0 40px rgba(168,85,247,0.4); }
    to   { text-shadow: 0 0 35px rgba(236,72,153,1), 0 0 70px rgba(168,85,247,0.8); }
  }
  .heart { display:inline-block; color:#f43f5e; animation: hb 1.4s ease-in-out infinite; }
  @keyframes hb { 0%,100%{transform:scale(1)} 30%{transform:scale(1.4)} 60%{transform:scale(1)} 75%{transform:scale(1.2)} }

  /* Photo frame */
  .frame-wrap {
    position: relative;
    width: clamp(240px, 40vw, 340px);
    height: clamp(240px, 40vw, 340px);
  }
  .glow-ring {
    position: absolute; inset: -14px; border-radius: 50%;
    background: conic-gradient(#f43f5e, #a855f7, #3b82f6, #ec4899, #8b5cf6, #06b6d4, #f43f5e);
    animation: spin 6s linear infinite; filter: blur(3px);
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .gap-ring { position:absolute; inset:-2px; border-radius:50%; background:#0b0b1e; }
  .orbit { position:absolute; inset:-26px; border-radius:50%; animation:spin 9s linear infinite reverse; }
  .orbit-dot {
    position:absolute; width:9px; height:9px; background:#f43f5e; border-radius:50%;
    box-shadow:0 0 10px #f43f5e,0 0 20px #f43f5e; top:50%; left:-4px; margin-top:-4px;
  }
  .orbit-dot:nth-child(2) { background:#a855f7; box-shadow:0 0 10px #a855f7,0 0 20px #a855f7; top:-4px; left:50%; margin-left:-4px; margin-top:0; }
  .orbit-dot:nth-child(3) { background:#06b6d4; box-shadow:0 0 10px #06b6d4,0 0 20px #06b6d4; top:50%; right:-4px; left:auto; margin-top:-4px; }
  .photo-circle { width:100%; height:100%; border-radius:50%; overflow:hidden; position:relative; z-index:0; background:#111; }
  .photo-circle img { width:100%; height:100%; object-fit:cover; object-position:center top; display:block; border-radius:50%; }
  .inner-border { position:absolute; inset:0; border-radius:50%; border:2px solid rgba(255,255,255,0.12); box-shadow:inset 0 0 28px rgba(168,85,247,0.25); z-index:1; pointer-events:none; }
  .shine { position:absolute; inset:0; border-radius:50%; background:linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 55%); z-index:2; pointer-events:none; }

  /* Divider & subtitle */
  .divider { display:flex; align-items:center; gap:16px; color:rgba(200,180,255,0.4); letter-spacing:4px; }
  .divider-line { width:70px; height:1px; background:linear-gradient(90deg,transparent,rgba(168,85,247,0.5),transparent); }
  .subtitle { font-weight:300; font-size:clamp(0.8rem,2vw,1rem); letter-spacing:6px; text-transform:uppercase; color:rgba(200,180,255,0.65); animation:fade-float 3s ease-in-out infinite alternate; }
  @keyframes fade-float { from{opacity:0.5;transform:translateY(0)} to{opacity:1;transform:translateY(-5px)} }

  /* ── Made by Me ── */
  .section-divider {
    width: clamp(280px, 80vw, 500px);
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(168,85,247,0.4), rgba(236,72,153,0.4), transparent);
    margin-top: 4px;
  }
  .made-by-me { width: 100%; max-width: 500px; }
  .made-by-me-title {
    font-family: "Great Vibes", cursive;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    color: #fff; text-align: center; margin-bottom: 20px;
    text-shadow: 0 0 24px rgba(168,85,247,0.8), 0 0 50px rgba(236,72,153,0.4);
  }
  .projects { display: flex; flex-direction: column; gap: 14px; padding: 0 10px; }
  .project-card {
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(168,85,247,0.2);
    border-radius: 18px; padding: 16px 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  }
  .project-card:hover {
    transform: translateY(-4px);
    border-color: rgba(236,72,153,0.5);
    box-shadow: 0 10px 36px rgba(236,72,153,0.18), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .project-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg,#a855f7,#ec4899);
    box-shadow: 0 0 10px rgba(168,85,247,0.7);
    animation: pulse-dot 2s ease-in-out infinite alternate;
  }
  .project-card:nth-child(2) .project-dot { background:linear-gradient(135deg,#06b6d4,#3b82f6); box-shadow:0 0 10px rgba(6,182,212,0.7); }
  @keyframes pulse-dot { from{opacity:0.7;transform:scale(1)} to{opacity:1;transform:scale(1.3)} }
  .project-info { display:flex; flex-direction:column; gap:4px; flex:1; }
  .project-name { font-weight:800; font-size:clamp(1.3rem,3.5vw,1.7rem); color:#fff; letter-spacing:0.5px; }
  .project-tag { display:none; }
  .visit-btn {
    display: inline-flex; align-items: center; gap: 7px;
    text-decoration: none;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    color: #fff; font-size: 0.78rem; font-weight: 400;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 10px 20px; border-radius: 50px; white-space: nowrap; flex-shrink: 0;
    box-shadow: 0 4px 18px rgba(168,85,247,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .visit-btn:hover { transform:scale(1.07); box-shadow:0 6px 28px rgba(236,72,153,0.6); }
  .project-card:nth-child(2) .visit-btn { background:linear-gradient(135deg,#06b6d4,#3b82f6); box-shadow:0 4px 18px rgba(6,182,212,0.35); }
  .project-card:nth-child(2) .visit-btn:hover { box-shadow:0 6px 28px rgba(6,182,212,0.6); }
  .visit-btn svg { width:12px; height:12px; fill:none; stroke:#fff; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }

  /* Social Buttons */
  .social-buttons {
    display: flex; gap: 16px; justify-content: center;
    flex-wrap: wrap; padding: 10px 20px 20px;
  }
  .social-btn {
    display: inline-flex; align-items: center; gap: 10px;
    text-decoration: none; color: #fff;
    font-size: 1rem; font-weight: 600; letter-spacing: 1px;
    padding: 14px 30px; border-radius: 50px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .social-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
  .facebook-btn {
    background: linear-gradient(135deg, #1877f2, #0a5cbf);
    box-shadow: 0 4px 20px rgba(24,119,242,0.45);
  }
  .facebook-btn:hover {
    transform: scale(1.07);
    box-shadow: 0 8px 32px rgba(24,119,242,0.7);
  }
  .instagram-btn {
    background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    box-shadow: 0 4px 20px rgba(220,39,67,0.45);
  }
  .instagram-btn:hover {
    transform: scale(1.07);
    box-shadow: 0 8px 32px rgba(220,39,67,0.7);
  }
</style>
</head>

  { inner:"#ffe4e4", outer:"#ff6060", glow:"255,96,96" },
];
function bakeFlower(size, petals, pal, petalType) {
  const pad = size*1.4, dim=(size+pad)*2;
  const oc = document.createElement("canvas");
  oc.width=dim; oc.height=dim;
  const c=oc.getContext("2d");
  c.translate(dim/2,dim/2);
  c.shadowBlur=size*0.9; c.shadowColor="rgba("+pal.glow+",0.9)";
  for(let i=0;i<petals;i++){
    c.save(); c.rotate((i/petals)*Math.PI*2);
    const grd=c.createRadialGradient(0,-size*0.28,0,0,-size*0.65,size*0.7);
    grd.addColorStop(0,"#fff"); grd.addColorStop(0.3,pal.inner); grd.addColorStop(1,pal.outer);
    c.fillStyle=grd; c.beginPath();
    if(petalType===0){ c.ellipse(0,-size*0.8,size*0.3,size*0.56,0,0,Math.PI*2); }
    else { c.moveTo(0,0); c.bezierCurveTo(size*0.25,-size*0.28,size*0.19,-size*0.8,0,-size*0.98); c.bezierCurveTo(-size*0.19,-size*0.8,-size*0.25,-size*0.28,0,0); }
    c.closePath(); c.fill(); c.restore();
  }
  c.shadowBlur=size*0.5; c.shadowColor="rgba(245,200,50,0.9)";
  const cg=c.createRadialGradient(0,0,0,0,0,size*0.24);
  cg.addColorStop(0,"#fff"); cg.addColorStop(0.45,"#fef9c3"); cg.addColorStop(1,"#f59e0b");
  c.beginPath(); c.arc(0,0,size*0.24,0,Math.PI*2); c.fillStyle=cg; c.fill();
  return oc;
}
const BAKED=PALETTES.map((pal,i)=>{
  const size=20+(i%4)*8, petals=5+(i%3), ptype=i%2;
  const img=bakeFlower(size,petals,pal,ptype);
  return {img, half:img.width/2};
});
class Flower {
  constructor(initY){this.reset(initY);}
  reset(initY){
    const b=BAKED[Math.floor(Math.random()*BAKED.length)];
    this.img=b.img; this.half=b.half;
    this.x=Math.random()*canvas.width;
    this.y=initY!==undefined?initY:canvas.height+90;
    this.speedY=0.45+Math.random()*0.65;
    this.speedX=(Math.random()-0.5)*0.35;
    this.rot=Math.random()*Math.PI*2;
    this.rotSpeed=(Math.random()-0.5)*0.01;
    this.alpha=0.6+Math.random()*0.38;
    this.sway=Math.random()*Math.PI*2;
    this.swayAmp=(Math.random()-0.5)*0.7;
  }
  update(){
    this.y-=this.speedY; this.sway+=0.016;
    this.x+=this.speedX+Math.sin(this.sway)*this.swayAmp;
    this.rot+=this.rotSpeed;
    if(this.y<-this.half*2) this.reset();
  }
  draw(){
    ctx.save(); ctx.globalAlpha=this.alpha;
    ctx.translate(this.x,this.y); ctx.rotate(this.rot);
    ctx.drawImage(this.img,-this.half,-this.half);
    ctx.restore();
  }
}
const flowers=Array.from({length:30},(_,i)=>new Flower(Math.random()*canvas.height));
let last=0;
function animate(ts){
  if(ts-last<17){requestAnimationFrame(animate);return;}
  last=ts;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const f of flowers){f.update();f.draw();}
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
